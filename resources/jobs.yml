resources:
  jobs:
    bronze_api_daily_job:
      name: run_bronze_flights

      schedule:
        quartz_cron_expression: "0 0 2/4 * * ?"
        timezone_id: Europe/Berlin
        pause_status: UNPAUSED

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - requests==2.32.5

      tasks:
        - task_key: run_bronze_flights
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/main_flights.py

        - task_key: run_silver_flights
          depends_on:
            - task_key: run_bronze_flights
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/silver/main_flights.py

    bronze_reference_monthly_job:
      name: run_bronze_reference_monthly

      schedule:
        quartz_cron_expression: "0 0 2 1 * ?"
        timezone_id: Europe/Berlin
        pause_status: UNPAUSED

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - requests==2.32.5

      tasks:
        - task_key: run_bronze_reference
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/main_reference.py

        - task_key: run_silver_reference
          depends_on:
            - task_key: run_bronze_reference
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/src/silver/main_reference.py
