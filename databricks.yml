bundle:
  name: lufthansa-level3

include:
  - resources/*.yml

sync:
  exclude:
    - er_diagram.md

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-a509cca2-e3dc.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
